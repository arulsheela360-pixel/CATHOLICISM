<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join as Member | Catholicism</title>
    <style>
        body { font-family: 'Georgia', serif; background-color: #a31a1a; margin: 0; padding: 0; color: #fff; }
        .header { text-align: center; padding: 20px; background-color: #630e10; border-bottom: 5px solid #d4af37; }
        .container { max-width: 500px; margin: 20px auto; background-color: #fff; color: #333; padding: 30px; border-radius: 5px; text-align: center; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #630e10; color: #d4af37; border: none; cursor: pointer; font-weight: bold; font-size: 16px; }
        #statusArea { color: #630e10; font-weight: bold; padding: 20px; }
    </style>
</head>
<body>

<div class="header">
    <img src="velasquez-coronacion-Copy.jpg" alt="Logo" style="width: 100%; max-width: 250px; height: auto;">
    <h1 style="color: #d4af37; margin: 10px 0;">CATHOLICISM</h1>
</div>

<div class="container" id="mainContainer">
    <h2 style="color: #630e10;">Join as Member</h2>
    <form id="memberForm">
        <input type="text" name="name" placeholder="Full Name" required>
        <input type="email" name="email" id="email" placeholder="Email Address" required>
        <select name="interest">
            <option value="Saints">Saints</option>
            <option value="Bible">Bible</option>
            <option value="Eucharistic Miracles">Eucharistic Miracles</option>
            <option value="All">All</option>
        </select>
        <button type="submit">Submit Application</button>
    </form>
</div>
<div id="statusArea" class="container" style="display:none;"></div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxhkD-nxO2tY3WJMVAi7DFDEqUIsW5AId1y2eh_Y6xjS9hZ3EsirRHxRTKKyQfhA-WUqg/exec";
    if(localStorage.getItem('memberApplied')) { showStatus("You have already submitted your application."); }
    document.getElementById('memberForm').addEventListener('submit', (e) => {
        e.preventDefault();
        fetch(SCRIPT_URL, {method: 'POST', body: new FormData(e.target)});
        localStorage.setItem('memberApplied', 'true');
        showStatus("Thank you! Your application has been submitted.");
    });
    function showStatus(msg) { document.getElementById('mainContainer').style.display = 'none'; document.getElementById('statusArea').innerText = msg; document.getElementById('statusArea').style.display = 'block'; }
</script>
</body>
</html>
